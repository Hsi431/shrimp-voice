<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <title>🦐 SHRIMP OS v2.9</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="🦐 蝦蝦語音">
    <style>
        :root { --green: #33ff33; --orange: #ff9900; --dim: #555; }
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #d8c8b8; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        .header { padding: 8px; border-bottom: 2px solid #222; text-align: center; color: var(--orange); font-weight: bold; font-size: 14px; letter-spacing: 2px; }
        .panel { flex: 1; padding: 10px; position: relative; overflow: hidden; }
        #crt { height: 100%; border: 8px solid #222; border-radius: 15px; background: #000; box-shadow: inset 0 0 30px #000; display: flex; flex-direction: column; }
        #log { flex: 1; padding: 15px; overflow-y: auto; font-size: 15px; color: var(--green); scroll-behavior: smooth; }
        .row { margin-bottom: 12px; line-height: 1.4; display: flex; align-items: flex-start; }
        .time { color: var(--dim); font-size: 11px; min-width: 45px; margin-top: 3px; }
        .tag-老闆 { background: #2d5a27; color: white; padding: 0 5px; border-radius: 3px; margin: 0 8px; font-weight: bold; font-size: 12px; }
        .tag-蝦蝦 { background: var(--orange); color: black; padding: 0 5px; border-radius: 3px; margin: 0 8px; font-weight: bold; font-size: 12px; }
        .tag-SYS, .tag-ERR { color: var(--dim); margin: 0 8px; font-size: 11px; }
        .msg-SYS { color: var(--dim); font-size: 12px; }
        .tag-ERR { color: #ff5555; }
        .msg-ERR { color: #ff5555; font-size: 12px; }
        .controls { padding: 20px; display: flex; gap: 15px; background: #111; border-top: 1px solid #222; }
        button { flex: 1; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; color: #fff; transition: 0.1s; box-shadow: 0 4px 0 #000; }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }
        .btn-act { background: #2d5a27; } .btn-std { background: #600; }
        /* 隱藏滾動條 */
        #log::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>
    <div class="header">[ SHRIMP CORE v2.9 ]</div>
    <div class="panel">
        <div id="crt"><div id="log"></div></div>
    </div>
    <div class="controls">
        <button class="btn-act" onclick="start()">ACTIVATE</button>
        <button class="btn-std" onclick="stop()">STANDBY</button>
    </div>

    <script>
        let ws, ctx, stream, proc, playing = false;

        // 連線 token：開 https://host:8443/?token=XXX 一次即存入 localStorage
        const urlToken = new URLSearchParams(location.search).get('token');
        if (urlToken) localStorage.setItem('shrimp_token', urlToken);
        const wsToken = localStorage.getItem('shrimp_token') || '';

        // 🎯 打字機效果函式
        async function typewriter(element, text, speed = 40) {
            for (let char of text) {
                element.innerHTML += char;
                if (char === '。' || char === '？') await new Promise(r => setTimeout(r, 200));
                else await new Promise(r => setTimeout(r, speed));
                const logEl = document.getElementById('log');
                logEl.scrollTop = logEl.scrollHeight;
            }
        }

        function addLog(tag, msg) {
            // server 送 STT/AI，UI 顯示成 老闆/蝦蝦
            tag = { 'STT': '老闆', 'AI': '蝦蝦' }[tag] || tag;
            const logEl = document.getElementById('log');
            const timeStr = new Date().toLocaleTimeString('zh-TW', {hour12:false, hour:'2-digit', minute:'2-digit'});
            
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<span class="time">${timeStr}</span><span class="tag-${tag}">${tag}</span><span class="msg-${tag}" id="msg-${Date.now()}"></span>`;
            logEl.appendChild(row);
            
            const msgEl = row.querySelector('.msg-' + tag);
            
            // 🎯 如果是蝦蝦在回話，執行打字機效果
            if (tag === '蝦蝦') { typewriter(msgEl, msg); } 
            else { msgEl.innerText = msg; }
            
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function start() {
            addLog('SYS', '機組連線中...');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const src = ctx.createMediaStreamSource(stream);
                proc = ctx.createScriptProcessor(4096, 1, 1);
                proc.onaudioprocess = e => { if (ws?.readyState === 1 && !playing) {
                    const d = e.inputBuffer.getChannelData(0); const pcm = new Int16Array(d.length);
                    for (let i=0; i<d.length; i++) pcm[i] = d[i]*32767; ws.send(pcm.buffer);
                }};
                src.connect(proc); proc.connect(ctx.destination);
                ws = new WebSocket('wss://' + location.host + '/audio' + (wsToken ? '?token=' + encodeURIComponent(wsToken) : ''));
                ws.onmessage = async e => {
                    if (e.data instanceof Blob) {
                        playing = true; const buf = await ctx.decodeAudioData(await e.data.arrayBuffer());
                        const s = ctx.createBufferSource(); s.buffer = buf; s.connect(ctx.destination);
                        s.onended = () => playing = false; s.start();
                    } else { const d = JSON.parse(e.data); addLog(d.tag, d.msg); }
                };
            } catch(e) { addLog('ERR', '麥克風異常'); }
        }

        function stop() { if(proc) proc.disconnect(); if(ws) ws.close(); addLog('SYS', 'STANDBY'); }
    </script>
</body>
</html>
